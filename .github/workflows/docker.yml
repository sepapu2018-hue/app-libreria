name: Construir y subir imagen Angular

on:
  push:
    branches:
      - master

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Compilar Angular
        run: npm run build

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen
        run: docker build -t jsnarvaezl/app-libreria:latest .

      - name: Subir imagen
        run: docker push jsnarvaezl/app-libreria:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 18.216.93.128
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull jsnarvaezl/app-libreria:latest
            sudo docker stop app-libreria-frontend || true
            sudo docker rm app-libreria-frontend || true
            sudo docker run -d \
              --name app-libreria-frontend \
              --network libreria-net \
              -p 80:80 \
              jsnarvaezl/app-libreria:latest
