<div class="max-w-5xl mx-auto p-6 bg-slate-50 min-h-screen">
  
  <h1 class="text-3xl font-extrabold text-slate-800 mb-8 border-b-4 border-indigo-500 inline-block">
    Gestión de Libros - Biblioteca
  </h1>

  <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200 mb-10">
    <h2 class="text-xl font-bold text-slate-700 mb-4">Registro Rápido</h2>
    <form (ngSubmit)="guardarLibro()" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <input [(ngModel)]="nuevoLibro.titulo" name="titulo" type="text" placeholder="título" required
        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
      
      <input [(ngModel)]="nuevoLibro.numeroPaginas" name="numeroPaginas" type="text" placeholder="páginas" required
        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
       
      <input [(ngModel)]="nuevoLibro.editorial" name="editorial" type="text" placeholder="editorial" required
      class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
      
        <button type="submit" 
        class="md:col-span-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-indigo-200">
        Registrar
      </button>
    </form>
  </div>

  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    <table class="w-full text-left border-collapse">
      <thead class="bg-slate-800 text-slate-100">
        <tr>
          <th class="p-4 font-semibold uppercase text-sm">Acciones</th>
          <th class="p-4 font-semibold uppercase text-sm">Título</th>
          <th class="p-4 font-semibold uppercase text-sm">Páginas</th>
          <th class="p-4 font-semibold uppercase text-sm">Editorial</th>
        </tr>
      </thead>
      <tbody>
       @for (libro of listaLibros(); track libro.id) {
          <tr class="border-b border-slate-100 hover:bg-indigo-50 transition-colors">
            <td class="p-4 text-slate-500 font-mono text-xs">
              
              <button (click)="seleccionarParaEditar(libro)" class="pr-10">✏️​</button>
              <button (click)="eliminarLibro(libro.id!)">🗑️​</button>
             
            </td>
            <td class="p-4 text-slate-500 font-mono text-xs">{{libro.titulo}}</td>
            <td class="p-4 text-slate-800 font-medium">{{libro.numeroPaginas}}</td>
            <td class="p-4 text-slate-600">{{libro.editorial}}</td>
          </tr>
        }@empty {
          <tr>
            <td colspan="4" class="p-8 text-center text-slate-400 italic">
              Cargando usuarios desde la API...
            </td>
          </tr>
          }
      </tbody>
    </table>
  </div>
</div>
